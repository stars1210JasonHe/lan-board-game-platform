<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>LAN Board Games</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta http-equiv="Pragma" content="no-cache"/>
<meta http-equiv="Expires" content="0"/>
<script>
// Force reload if version mismatch (cache buster)
const APP_VERSION = '20260304-0100';
const cached = localStorage.getItem('app_version');
if (cached && cached !== APP_VERSION) { localStorage.setItem('app_version', APP_VERSION); location.reload(true); }
localStorage.setItem('app_version', APP_VERSION);
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#1a1a2e;color:#eee;min-height:100vh}
.app{max-width:1200px;margin:0 auto;padding:16px}
h1{text-align:center;color:#e94560;margin-bottom:24px;font-size:2rem}
.screen{display:none}.screen.active{display:block}
/* Lobby */
.lobby-form{display:flex;gap:8px;margin-bottom:24px;justify-content:center}
.lobby-form input{padding:10px 16px;border-radius:8px;border:1px solid #333;background:#16213e;color:#eee;font-size:1rem;width:240px}
.lobby-form select{padding:10px 16px;border-radius:8px;border:1px solid #333;background:#16213e;color:#eee;font-size:1rem}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:600;transition:opacity 0.2s}
.btn:hover{opacity:0.85}
.btn-primary{background:#e94560;color:#fff}
.btn-secondary{background:#0f3460;color:#eee}
.btn-success{background:#27ae60;color:#fff}
.btn-danger{background:#c0392b;color:#fff}
.btn-small{padding:6px 12px;font-size:0.85rem}
.rooms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.room-card{background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:16px;cursor:pointer;transition:border-color 0.2s}
.room-card:hover{border-color:#e94560}
.room-card h3{color:#e94560;margin-bottom:8px}
.room-card .meta{font-size:0.85rem;color:#aaa;margin-bottom:12px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:0.75rem;font-weight:600}
.badge-waiting{background:#0f3460;color:#7ec8e3}
.badge-playing{background:#27ae60;color:#fff}
.badge-finished{background:#555;color:#aaa}
/* Room */
.room-layout{display:grid;grid-template-columns:1fr 320px;gap:16px}
.panel{background:#16213e;border:1px solid #0f3460;border-radius:12px;padding:16px}
.players-list{display:flex;gap:16px;margin-bottom:16px}
.player-slot{flex:1;background:#0f3460;border-radius:8px;padding:12px;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.player-slot .nick{font-weight:700;font-size:1.1rem;margin-bottom:4px}
.player-slot .side{font-size:0.8rem;color:#aaa}
.player-slot .ready-dot{width:10px;height:10px;border-radius:50%;margin-top:6px}
.ready-dot.ready{background:#27ae60}.ready-dot.not-ready{background:#c0392b}
.room-controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
/* Chat */
.chat-panel{display:flex;flex-direction:column;height:400px}
.chat-messages{flex:1;overflow-y:auto;background:#0f3460;border-radius:8px;padding:10px;margin-bottom:8px;font-size:0.85rem}
.chat-msg{margin-bottom:6px;line-height:1.4}
.chat-msg .sender{font-weight:700;margin-right:4px}
.chat-msg.system .sender{color:#f39c12}
.chat-msg.ai .sender{color:#9b59b6}
.chat-input{display:flex;gap:6px}
.chat-input input{flex:1;padding:8px 12px;border-radius:6px;border:1px solid #333;background:#16213e;color:#eee}
/* Match */
.match-layout{display:grid;grid-template-columns:1fr 320px;gap:16px}
.board-area{display:flex;flex-direction:column;align-items:center}
.turn-indicator{background:#0f3460;border-radius:8px;padding:10px 20px;margin-bottom:12px;font-weight:700;text-align:center}
.board-container{position:relative}
/* Chess/Gomoku/Xiangqi board */
canvas{border-radius:8px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.match-controls{display:flex;gap:8px;margin-top:12px;justify-content:center;flex-wrap:wrap}
.move-history{max-height:200px;overflow-y:auto;font-size:0.8rem;background:#0f3460;border-radius:6px;padding:8px;margin-top:10px}
.move-history div{padding:2px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
/* End modal */
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:100}
.modal-box{background:#16213e;border:2px solid #e94560;border-radius:16px;padding:32px;text-align:center;min-width:320px}
.modal-box h2{color:#e94560;font-size:1.8rem;margin-bottom:12px}
.modal-box p{color:#aaa;margin-bottom:20px;font-size:1.1rem}
.modal-box .btns{display:flex;gap:12px;justify-content:center}
.hidden{display:none}
/* Pulsing ready button */
@keyframes pulse-ready{0%{box-shadow:0 0 0 0 rgba(233,69,96,0.6)}70%{box-shadow:0 0 0 15px rgba(233,69,96,0)}100%{box-shadow:0 0 0 0 rgba(233,69,96,0)}}
.btn-ready-pulse{animation:pulse-ready 1.5s infinite;font-size:1.4rem!important;padding:16px 40px!important;border:3px solid #fff!important}
/* Match history */
.match-history-section{margin-top:16px}
.match-history-section h3{color:#e94560;margin-bottom:8px;font-size:0.95rem}
.history-table{width:100%;border-collapse:collapse;font-size:0.78rem}
.history-table th{background:#0f3460;color:#7ec8e3;padding:4px 6px;text-align:left;border-bottom:1px solid #333}
.history-table td{padding:4px 6px;border-bottom:1px solid #1a2a4a;vertical-align:middle}
.history-table tr:hover td{background:#0f3460}
.result-win{color:#27ae60;font-weight:700}
.result-loss{color:#e94560}
.result-draw{color:#f39c12}
</style>
</head>
<body>
<div class="app">
<h1>🎮 LAN Board Games</h1>

<!-- LOBBY -->
<div id="screen-lobby" class="screen active">
  <div class="lobby-form">
    <input id="nick-input" placeholder="Your nickname" maxlength="20"/>
    <select id="game-select">
      <option value="gomoku">Gomoku</option>
      <option value="chess">Chess</option>
      <option value="xiangqi">Xiangqi</option>
    </select>
    <select id="side-select" style="padding:6px 12px;border-radius:8px;border:1px solid #333;background:#16213e;color:#eee;font-size:0.9rem">
      <option value="random">Random (随机)</option>
      <option value="first">First (先手)</option>
      <option value="second">Second (后手)</option>
    </select>
    <button class="btn btn-success" onclick="createRoom(false)">Create Room</button>
    <button class="btn btn-primary" onclick="createRoomAi('euler')">vs OpenClaw AI 🤖</button>
    <button class="btn btn-secondary" onclick="showEngineOptions()">vs Engine ⚙️</button>
    <select id="difficulty-select" style="display:none;padding:6px 12px;border-radius:8px;border:1px solid #333;background:#16213e;color:#eee;font-size:0.9rem">
      <option value="beginner">Beginner</option>
      <option value="easy">Easy</option>
      <option value="medium" selected>Medium</option>
      <option value="hard">Hard</option>
      <option value="max">Max</option>
    </select>
    <button class="btn btn-secondary btn-small" id="btn-engine-go" style="display:none" onclick="createRoomAi('engine')">Start</button>
  </div>
  <div id="rooms-container" class="rooms-grid"><p style="color:#aaa;text-align:center">No rooms yet.</p></div>
</div>

<!-- ROOM -->
<div id="screen-room" class="screen">
  <div class="room-layout">
    <div class="panel">
      <h2 id="room-title">Room</h2>
      <div class="players-list" id="players-list"></div>
      <div id="room-status" style="text-align:center;margin:12px 0;color:#f39c12;font-size:1rem;min-height:24px"></div>
      <div style="text-align:center;margin:16px 0">
        <button class="btn btn-primary btn-ready-pulse" id="btn-ready" onclick="sendReady()" style="width:100%;max-width:400px;background:#e94560">
          🎮 READY UP — Click Here to Start!
        </button>
      </div>
      <div class="room-controls" style="justify-content:center">
        <button class="btn btn-danger btn-small" onclick="leaveRoom()">Leave Room</button>
      </div>
      <div class="match-history-section" id="room-history-section" style="display:none">
        <h3>Match History</h3>
        <div id="room-history-list"></div>
      </div>
    </div>
    <div class="panel chat-panel">
      <h3>Chat</h3>
      <div class="chat-messages" id="chat-room"></div>
      <div class="chat-input">
        <input id="chat-room-input" placeholder="Message..." onkeydown="if(event.key==='Enter')sendChat('room')"/>
        <button class="btn btn-secondary btn-small" onclick="sendChat('room')">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- MATCH -->
<div id="screen-match" class="screen">
  <div class="match-layout">
    <div class="panel board-area">
      <div class="turn-indicator" id="turn-indicator">Waiting...</div>
      <canvas id="board-canvas" width="600" height="600"></canvas>
      <div class="match-controls">
        <button class="btn btn-danger btn-small" onclick="resign()">Resign</button>
        <button class="btn btn-secondary btn-small" onclick="leaveRoom()">Exit</button>
      </div>
      <div class="move-history" id="move-history"></div>
    </div>
    <div class="panel chat-panel">
      <h3>Chat</h3>
      <div class="chat-messages" id="chat-match"></div>
      <div class="chat-input">
        <input id="chat-match-input" placeholder="Message..." onkeydown="if(event.key==='Enter')sendChat('match')"/>
        <button class="btn btn-secondary btn-small" onclick="sendChat('match')">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- END MODAL -->
<div id="end-modal" class="modal hidden">
  <div class="modal-box">
    <h2 id="end-title">Game Over</h2>
    <p id="end-desc"></p>
    <div class="btns">
      <button class="btn btn-success" onclick="playAgain()">Play Again</button>
      <button class="btn btn-secondary" onclick="leaveRoom()">Exit Room</button>
    </div>
  </div>
</div>

<script>
const WS_URL = `ws://${location.host}`;
let ws = null, clientId = null, myNick = '', myRoom = null, mySide = null;
let gameType = 'gomoku', gameState = null, selectedFrom = null;

// ── Nick persistence ──────────────────────────────────────────────────────────
window.onload = () => {
  const saved = localStorage.getItem('bgp_nick');
  if (saved) document.getElementById('nick-input').value = saved;
  connect();
};

function getNick() {
  const n = document.getElementById('nick-input').value.trim() || 'Player';
  localStorage.setItem('bgp_nick', n);
  return n;
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);
  ws.onopen = () => { myNick = getNick(); ws.send(JSON.stringify({ type: 'identify', nick: myNick })); };
  ws.onmessage = e => { try { handleMsg(JSON.parse(e.data)); } catch(err) { console.warn('Bad WS message:', err); } };
  ws.onclose = () => setTimeout(connect, 2000);
}

function send(msg) { if (ws?.readyState === 1) ws.send(JSON.stringify(msg)); }

function handleMsg(msg) {
  if (msg.type === 'identified') { clientId = msg.clientId; }
  if (msg.type === 'rooms_list') renderRooms(msg.rooms);
  if (msg.type === 'room_joined') { myRoom = msg.roomId; showScreen('room'); }
  if (msg.type === 'room_state') updateRoomState(msg.room);
  if (msg.type === 'match_start') {
    const sides = msg.sides || {};
    mySide = sides[clientId] || null;
    gameState = msg.gameState;
    showScreen('match');
    renderBoard(); updateTurn();
  }
  if (msg.type === 'move') { gameState = msg.gameState; renderBoard(); updateTurn(); addMove(msg); }
  if (msg.type === 'chat') appendChat(msg.message);
  if (msg.type === 'match_end') showEndModal(msg);
  if (msg.type === 'player_ready') {}
  if (msg.type === 'player_left') {
    appendChat({ nick:'System', text:`${String(msg.nick)} disconnected. Returning to lobby...`, system:true });
    showError(`${String(msg.nick)} disconnected — returning to lobby...`);
    document.getElementById('end-modal').classList.add('hidden');
    setTimeout(() => { leaveRoom(); }, 3000);
  }
  if (msg.type === 'error') { console.warn('Server error:', msg.msg); showError(msg.msg); }
}

// ── Screens ───────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  document.getElementById('end-modal')?.classList.add('hidden');
}

// ── Lobby ─────────────────────────────────────────────────────────────────────
function renderRooms(rooms) {
  const el = document.getElementById('rooms-container');
  if (!rooms.length) { el.innerHTML = '<p style="color:#aaa;text-align:center">No rooms yet. Create one!</p>'; return; }
  el.innerHTML = rooms.map(r => `
    <div class="room-card" onclick="joinRoom('${escHtml(r.id)}')">
      <h3>${escHtml(r.gameType.toUpperCase())}</h3>
      <div class="meta">Room: ${escHtml(r.id)} · ${r.playerCount}/2 players</div>
      <div>${r.players.map(p=>`<span style="margin-right:8px">👤 ${escHtml(p.nick)}${p.isAi?' 🤖':''}</span>`).join('')}</div>
      <div style="margin-top:8px"><span class="badge badge-${escHtml(r.state)}">${escHtml(r.state)}</span></div>
    </div>
  `).join('');
}

function showEngineOptions() {
  const sel = document.getElementById('difficulty-select');
  const btn = document.getElementById('btn-engine-go');
  const visible = sel.style.display !== 'none';
  sel.style.display = visible ? 'none' : 'inline-block';
  btn.style.display = visible ? 'none' : 'inline-block';
}

function createRoomAi(aiType) {
  myNick = getNick();
  gameType = document.getElementById('game-select').value;
  ws.send(JSON.stringify({ type: 'identify', nick: myNick }));
  const msg = { type: 'create_room', gameType, withAi: true, aiType, preferredSide: document.getElementById('side-select').value };
  if (aiType === 'engine') {
    msg.difficulty = document.getElementById('difficulty-select').value;
  }
  send(msg);
}

function createRoom(withAi) {
  myNick = getNick();
  gameType = document.getElementById('game-select').value;
  ws.send(JSON.stringify({ type: 'identify', nick: myNick }));
  const msg = { type: 'create_room', gameType, withAi, preferredSide: document.getElementById('side-select').value };
  send(msg);
}

function joinRoom(roomId) {
  myNick = getNick();
  ws.send(JSON.stringify({ type: 'identify', nick: myNick }));
  send({ type: 'join_room', roomId });
}

function leaveRoom() {
  send({ type: 'leave_room' });
  myRoom = null; mySide = null; gameState = null;
  showScreen('lobby');
  document.getElementById('end-modal').classList.add('hidden');
}

// ── Room ──────────────────────────────────────────────────────────────────────
function updateRoomState(room) {
  document.getElementById('room-title').textContent = `Room: ${room.id} (${room.gameType})`;
  gameType = room.gameType;
  gameState = room.gameState;

  if (room.state === 'waiting') {
    // Bug #14 fix: if end modal is visible, don't auto-navigate away — let player confirm
    const modalVisible = !document.getElementById('end-modal').classList.contains('hidden');
    selectedFrom = null;
    gameState = null;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (!modalVisible) showScreen('room');
  }

  if (room.state === 'playing' && gameState) {
    showScreen('match');
    // Find our side
    if (!mySide) {
      const me = room.players[clientId];
      if (me) mySide = me.side;
    }
    renderBoard(); updateTurn();
  }

  const pl = document.getElementById('players-list');
  const pArr = Object.entries(room.players);
  pl.innerHTML = pArr.map(([id, p]) => `
    <div class="player-slot">
      <div class="nick">${escHtml(p.nick)}${p.isAi?' 🤖':''}</div>
      <div class="side">${escHtml(p.side ?? '—')}</div>
      <div class="ready-dot ${p.ready?'ready':'not-ready'}"></div>
    </div>
  `).join('') || '<div class="player-slot"><div class="nick" style="color:#aaa">Waiting...</div></div>';

  // Set our side
  const me = room.players[clientId];
  if (me) mySide = me.side;

  // Update ready button
  const btn = document.getElementById('btn-ready');
  const statusEl = document.getElementById('room-status');
  if (me) {
    btn.textContent = me.ready ? '✅ Ready! (click to unready)' : '🎮 READY UP — Click Here to Start!';
    btn.style.background = me.ready ? '#27ae60' : '#e94560';
    btn.className = me.ready ? 'btn btn-success' : 'btn btn-primary btn-ready-pulse';
    btn.style.width = '100%';
    btn.style.maxWidth = '400px';
  }
  const allPlayers = Object.values(room.players);
  const readyCount = allPlayers.filter(p => p.ready).length;
  if (statusEl) {
    if (allPlayers.length < 2) statusEl.textContent = '⏳ Waiting for opponent to join...';
    else if (readyCount < allPlayers.length) statusEl.textContent = `⏳ ${readyCount}/${allPlayers.length} players ready — click the button above!`;
    else statusEl.textContent = '🚀 All ready! Starting...';
  }

  // Replay chat
  const chatEl = document.getElementById('chat-room');
  chatEl.innerHTML = '';
  (room.chat ?? []).forEach(m => appendChat(m, 'room'));

  // Feature #1: Match history
  renderMatchHistory(room.matchHistory ?? []);
}

function sendReady() { send({ type: 'ready' }); }

// ── Match History (Feature #1) ─────────────────────────────────────────────────
function renderMatchHistory(history) {
  const section = document.getElementById('room-history-section');
  const list = document.getElementById('room-history-list');
  if (!history || history.length === 0) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  const rows = history.map(m => {
    const moves = (() => { try { return JSON.parse(m.moves || '[]').length; } catch { return '?'; } })();
    const dur = (m.started_at && m.ended_at) ? (() => {
      const s = Math.round((new Date(m.ended_at) - new Date(m.started_at)) / 1000);
      return s < 60 ? `${s}s` : `${Math.floor(s/60)}m${s%60}s`;
    })() : '—';
    const result = m.result || '?';
    const isWin = result.includes('wins');
    const isDraw = result.includes('Draw');
    const cls = isDraw ? 'result-draw' : isWin ? 'result-win' : 'result-loss';
    const date = m.ended_at ? new Date(m.ended_at).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : '—';
    return `<tr>
      <td>${escHtml(m.player1)} vs ${escHtml(m.player2)}</td>
      <td class="${cls}">${escHtml(result)}</td>
      <td>${moves} moves</td>
      <td>${dur}</td>
      <td style="color:#777">${date}</td>
    </tr>`;
  });
  list.innerHTML = `<table class="history-table">
    <thead><tr><th>Players</th><th>Result</th><th>Moves</th><th>Time</th><th>At</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table>`;
}

// ── Chat ──────────────────────────────────────────────────────────────────────
function appendChat(msg, scope) {
  const ids = ['chat-room','chat-match'];
  ids.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const div = document.createElement('div');
    div.className = `chat-msg${msg.system?' system':''}${msg.isAi?' ai':''}`;
    div.innerHTML = `<span class="sender" style="color:${msg.system?'#f39c12':msg.isAi?'#9b59b6':'#7ec8e3'}">${escHtml(msg.nick)}:</span> ${escHtml(msg.text)}`;
    el.appendChild(div);
    el.scrollTop = el.scrollHeight;
  });
}

function escHtml(s) { return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function sendChat(scope) {
  const id = scope === 'room' ? 'chat-room-input' : 'chat-match-input';
  const text = document.getElementById(id).value.trim();
  if (!text) return;
  send({ type: 'chat', text });
  document.getElementById(id).value = '';
}

// ── Error toast ──────────────────────────────────────────────────────────
let errorTimeout = null;
function showError(msg) {
  let toast = document.getElementById('error-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'error-toast';
    toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;padding:10px 24px;border-radius:8px;font-weight:600;z-index:200;display:none;font-size:0.95rem';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.display = 'block';
  if (errorTimeout) clearTimeout(errorTimeout);
  errorTimeout = setTimeout(() => { toast.style.display = 'none'; }, 2500);
}

// ── Match ─────────────────────────────────────────────────────────────────────
function isMyTurnNow() {
  if (!gameState || !mySide) return false;
  const cur = gameState.currentPlayer;
  // Normalize: gomoku sends number 1=black 2=white; chess/xiangqi send strings matching mySide
  const side = cur === 1 ? 'black' : cur === 2 ? 'white' : cur;
  return side === mySide;
}

function updateTurn() {
  if (!gameState) return;
  const el = document.getElementById('turn-indicator');
  const myTurn = isMyTurnNow();
  el.textContent = myTurn ? `Your turn (${mySide})` : `${gameState.currentPlayerName ?? gameState.currentPlayer}'s turn`;
  el.style.background = myTurn ? '#27ae60' : '#0f3460';
}

function addMove(msg) {
  const el = document.getElementById('move-history');
  const div = document.createElement('div');
  div.textContent = `${msg.side}: ${JSON.stringify(msg.move)}`;
  el.appendChild(div); el.scrollTop = el.scrollHeight;
}

function resign() { if (confirm('Resign?')) send({ type: 'resign' }); }

function playAgain() {
  // Hide the modal; the server response (match_start or room_state) will switch the screen
  document.getElementById('end-modal').classList.add('hidden');
  send({ type: 'play_again' });
}

function showEndModal(msg) {
  // Determine win/lose/draw from the perspective of this player
  let title, desc;
  if (msg.draw) {
    title = 'Draw!';
    desc = msg.result || 'The game ended in a draw.';
  } else if (!msg.winner) {
    title = 'Game Over';
    desc = msg.result || '';
  } else if (msg.winner === mySide) {
    title = 'You Win!';
    desc = msg.result || `You won as ${mySide}!`;
  } else {
    title = 'You Lose';
    desc = msg.result || `${msg.winner} wins.`;
  }
  document.getElementById('end-title').textContent = title;
  document.getElementById('end-desc').textContent = desc;
  document.getElementById('end-modal').classList.remove('hidden');
  renderBoard();
}

// ── Board Rendering ───────────────────────────────────────────────────────────
const canvas = document.getElementById('board-canvas');
const ctx = canvas.getContext('2d');
canvas.onclick = e => onBoardClick(e);

function renderBoard() {
  if (!gameState) return;
  const gt = gameState.gameType;
  if (gt === 'gomoku') renderGomoku();
  else if (gt === 'chess') renderChess();
  else renderXiangqi();
}

// ── Gomoku ────────────────────────────────────────────────────────────────────
function renderGomoku() {
  const size = 15, cell = Math.floor(600/16), pad = cell;
  canvas.width = canvas.height = pad*2 + cell*(size-1);
  ctx.fillStyle = '#d4a96a';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
  for (let i=0;i<size;i++) {
    ctx.beginPath(); ctx.moveTo(pad+i*cell,pad); ctx.lineTo(pad+i*cell,pad+(size-1)*cell); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(pad,pad+i*cell); ctx.lineTo(pad+(size-1)*cell,pad+i*cell); ctx.stroke();
  }
  // Star points
  for (const [r,c] of [[3,3],[3,11],[7,7],[11,3],[11,11]]) {
    ctx.beginPath(); ctx.arc(pad+c*cell,pad+r*cell,4,0,Math.PI*2); ctx.fillStyle='#333'; ctx.fill();
  }
  const board = gameState.board;
  for (let r=0;r<size;r++) for (let c=0;c<size;c++) {
    if (!board[r][c]) continue;
    ctx.beginPath(); ctx.arc(pad+c*cell,pad+r*cell,cell/2-2,0,Math.PI*2);
    ctx.fillStyle = board[r][c]===1?'#111':'#f5f5f5';
    ctx.fill(); ctx.strokeStyle='#888'; ctx.lineWidth=1; ctx.stroke();
  }
}

function onGomokuClick(x,y) {
  const size=15, cell=Math.floor(600/16), pad=cell;
  const c=Math.round((x-pad)/cell), r=Math.round((y-pad)/cell);
  if (r<0||r>=size||c<0||c>=size) return;
  send({ type:'move', move:{row:r,col:c} });
}

// ── Chess ─────────────────────────────────────────────────────────────────────
const CHESS_PIECES = {K:'♔',Q:'♕',R:'♖',B:'♗',N:'♘',P:'♙',k:'♚',q:'♛',r:'♜',b:'♝',n:'♞',p:'♟'};

function renderChess() {
  canvas.width = canvas.height = 600;
  const cell = 75;
  for (let r=0;r<8;r++) for (let c=0;c<8;c++) {
    ctx.fillStyle = (r+c)%2===0?'#f0d9b5':'#b58863';
    ctx.fillRect(c*cell,r*cell,cell,cell);
  }
  if (selectedFrom) {
    const [fr,fc] = selectedFrom;
    ctx.fillStyle='rgba(255,255,0,0.4)'; ctx.fillRect(fc*cell,fr*cell,cell,cell);
  }
  // Parse FEN to render pieces
  const fen = gameState.fen;
  if (!fen) return;
  const rows = fen.split(' ')[0].split('/');
  ctx.font = `${cell*0.75}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
  rows.forEach((row,r) => {
    let c=0;
    for (const ch of row) {
      if (isNaN(+ch)) {
        ctx.fillStyle = ch===ch.toUpperCase()?'#fff':'#111';
        ctx.strokeStyle = ch===ch.toUpperCase()?'#333':'#aaa';
        ctx.lineWidth=1;
        ctx.strokeText(CHESS_PIECES[ch]||ch, c*cell+cell/2, r*cell+cell/2);
        ctx.fillText(CHESS_PIECES[ch]||ch, c*cell+cell/2, r*cell+cell/2);
        c++;
      } else c+=+ch;
    }
  });
  // Labels
  ctx.fillStyle='#666'; ctx.font='12px sans-serif';
  'abcdefgh'.split('').forEach((l,i)=>{ctx.textAlign='center';ctx.fillText(l,i*cell+cell/2,595);});
  for(let i=0;i<8;i++){ctx.textAlign='left';ctx.fillText(8-i,2,i*cell+cell/2);}
}

function isOwnChessPiece(r,c) {
  const fen = gameState?.fen;
  if (!fen) return false;
  const rows = fen.split(' ')[0].split('/');
  let col = 0, piece = null;
  for (const ch of rows[r] || '') {
    if (isNaN(+ch)) { if (col === c) { piece = ch; break; } col++; }
    else col += +ch;
  }
  if (!piece) return false;
  return (mySide === 'white' && piece === piece.toUpperCase()) || (mySide === 'black' && piece === piece.toLowerCase());
}

function onChessClick(x,y) {
  const cell=75;
  const c=Math.floor(x/cell), r=Math.floor(y/cell);
  const sq = 'abcdefgh'[c] + (8-r);
  if (!selectedFrom) {
    if (!isOwnChessPiece(r,c)) return;
    selectedFrom=[r,c,sq]; renderBoard(); return;
  }
  const fromSq = selectedFrom[2];
  if (fromSq===sq) { selectedFrom=null; renderBoard(); return; }
  if (isOwnChessPiece(r,c)) { selectedFrom=[r,c,sq]; renderBoard(); return; }
  send({ type:'move', move:{ uci: fromSq+sq } });
  selectedFrom=null;
}

// ── Xiangqi ───────────────────────────────────────────────────────────────────
const XPIECES = {K:'将',k:'帅',A:'士',a:'仕',B:'象',b:'相',N:'马',n:'馬',R:'车',r:'車',C:'炮',c:'砲',P:'卒',p:'兵',' ':''};

function renderXiangqi() {
  const cols=9,rows=10,cell=60,padX=30,padY=30;
  canvas.width=padX*2+cell*(cols-1); canvas.height=padY*2+cell*(rows-1);
  ctx.fillStyle='#f5deb3'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.strokeStyle='#333'; ctx.lineWidth=1;
  for(let r=0;r<rows;r++){ctx.beginPath();ctx.moveTo(padX,padY+r*cell);ctx.lineTo(padX+(cols-1)*cell,padY+r*cell);ctx.stroke();}
  for(let c=0;c<cols;c++){
    if(c===0||c===cols-1){ctx.beginPath();ctx.moveTo(padX+c*cell,padY);ctx.lineTo(padX+c*cell,padY+(rows-1)*cell);ctx.stroke();}
    else{
      ctx.beginPath();ctx.moveTo(padX+c*cell,padY);ctx.lineTo(padX+c*cell,padY+4*cell);ctx.stroke();
      ctx.beginPath();ctx.moveTo(padX+c*cell,padY+5*cell);ctx.lineTo(padX+c*cell,padY+(rows-1)*cell);ctx.stroke();
    }
  }
  // River text
  ctx.fillStyle='#8b4513'; ctx.font='18px serif'; ctx.textAlign='center';
  ctx.fillText('楚 河',padX+2*cell,padY+4.5*cell);
  ctx.fillText('汉 界',padX+6*cell,padY+4.5*cell);

  // Draw pieces
  const board = gameState.board;
  if(!board) return;
  board.forEach((rowStr,r)=>{
    [...rowStr].forEach((p,c)=>{
      if(p===' ') return;
      const x=padX+c*cell, y=padY+r*cell;
      ctx.beginPath(); ctx.arc(x,y,cell/2-3,0,Math.PI*2);
      ctx.fillStyle=p===p.toUpperCase()?'#cc3300':'#003366';
      ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle='#fff'; ctx.font=`bold ${cell*0.45}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(XPIECES[p]||p,x,y);
    });
  });
  if(selectedFrom) {
    const [fr,fc]=selectedFrom;
    ctx.strokeStyle='#ff0'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.arc(padX+fc*cell,padY+fr*cell,cell/2-1,0,Math.PI*2); ctx.stroke();
  }
}

function isOwnXiangqiPiece(r,c) {
  const board = gameState?.board;
  if (!board || !board[r]) return false;
  const p = board[r][c];
  if (!p || p === ' ') return false;
  return (mySide === 'red' && p === p.toUpperCase()) || (mySide === 'black' && p === p.toLowerCase());
}

function onXiangqiClick(x,y) {
  const cell=60,padX=30,padY=30;
  const c=Math.round((x-padX)/cell), r=Math.round((y-padY)/cell);
  if(r<0||r>9||c<0||c>8) return;
  if(!selectedFrom) {
    if (!isOwnXiangqiPiece(r,c)) return;
    selectedFrom=[r,c]; renderBoard(); return;
  }
  const [fr,fc]=selectedFrom;
  if(fr===r&&fc===c) { selectedFrom=null; renderBoard(); return; }
  if (isOwnXiangqiPiece(r,c)) { selectedFrom=[r,c]; renderBoard(); return; }
  send({ type:'move', move:{fromRow:fr,fromCol:fc,toRow:r,toCol:c} });
  selectedFrom=null;
}

function onBoardClick(e) {
  if(!gameState||gameState.finished) return;
  if(!isMyTurnNow()) return;
  const rect=canvas.getBoundingClientRect();
  const x=e.clientX-rect.left, y=e.clientY-rect.top;
  const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
  const gt=gameState.gameType;
  if(gt==='gomoku') onGomokuClick(x*sx,y*sy);
  else if(gt==='chess') onChessClick(x*sx,y*sy);
  else onXiangqiClick(x*sx,y*sy);
}
</script>
